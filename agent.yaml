apiVersion: v1
kind: Pod
spec:
  containers:
    - name: node
      image: node:24-alpine
      command: 
        - cat
      tty: true
      resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
    - name: docker
      image: docker:24-cli
      command: 
        - cat
      tty: true
      resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
      volumeMounts:
      - mountPath: /var/run/docker.sock
        name: docker-sock
    - name: kubectl
      image: bitnami/kubectl:latest
      command: 
        - cat
      tty: true
      resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
  volumes:
    - name: docker-sock
      hostPath:
        path: /var/run/docker.sock